# rpi6 — install as /etc/apache2/endpoints.d/workflow.conf
#
# Proxies https://rpi6.memention.net/workflow  ->  local uvicorn web server on :9005.
# Apache STRIPS the /workflow prefix (trailing slashes on both sides); the app runs with
# --root-path /workflow so it still emits correct links, redirects, and cookie paths.
# Mirrors the existing endpoints.d/ convention (cf. solar-current on the agent host).
#
# After installing: sudo a2enmod proxy proxy_http  (if not already)  &&  sudo systemctl reload apache2

# Bare /workflow (no trailing slash): RedirectMatch won't fire — the catch-all
# `ProxyPass / -> :9000` in zzz-root.conf claims the URL before mod_alias runs.
# So proxy it explicitly to the app root; longest-prefix match keeps /workflow/* on
# the rule below. The app (root_path /workflow) answers GET / with a 303 to /workflow/.
# ProxyPass matches in config order (first match wins, NOT longest prefix), so the
# /workflow/ rule must come before the bare /workflow one.
ProxyPass        /workflow/ http://localhost:9005/
ProxyPassReverse /workflow/ http://localhost:9005/
ProxyPass        /workflow  http://localhost:9005/
ProxyPassReverse /workflow  http://localhost:9005/
