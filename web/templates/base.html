<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- all relative links resolve against the public prefix ('/workflow/' in prod, '/' in dev) -->
  <base href="{{ request.scope.get('root_path', '') }}/">
  <title>{% block title %}Workflow Builder{% endblock %}</title>
  <!-- set theme before paint to avoid a flash -->
  <script>document.documentElement.dataset.theme=localStorage.theme||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ---- design tokens -------------------------------------------------
       Two type voices: --font-display (Space Grotesk) for everything a human
       wrote (headings, nav, buttons, labels); --font-mono (IBM Plex Mono) for
       everything the machine reports (run ids, statuses, timestamps, logs). */
    :root{
      --bg:#faf9f7; --surface:#ffffff; --surface-2:#f1efea;
      --fg:#23262b; --muted:#6d7480; --border:#e4e1da; --input:#d4d0c8;
      --accent:#a05e12; --accent-hover:#8a5110; --accent-fg:#fff;
      --soft:#ece9e2; --soft-fg:#3a3d43;
      --err:#b3362c; --ok:#1e7c3c; --run:#2563a8; --msg:#1e7c3c;
      --code:#f1efea;
      --font-display:"Space Grotesk",system-ui,sans-serif;
      --font-body:system-ui,-apple-system,sans-serif;
      --font-mono:"IBM Plex Mono",ui-monospace,monospace;
      --radius:8px;
    }
    [data-theme=dark]{
      --bg:#14161b; --surface:#1b1e25; --surface-2:#101216;
      --fg:#e7e4dd; --muted:#8f97a3; --border:#2b303a; --input:#3a4150;
      --accent:#e0a458; --accent-hover:#eab168; --accent-fg:#1a1408;
      --soft:#262a33; --soft-fg:#d5d2ca;
      --err:#e5766d; --ok:#7fc98b; --run:#7aa7d9; --msg:#7fc98b;
      --code:#101216;
    }

    /* ---- base ---- */
    body{font-family:var(--font-body);max-width:820px;margin:0 auto;padding:1.2rem 1.2rem 4rem;
         background:var(--bg);color:var(--fg);line-height:1.5}
    h1,h2,h3{font-family:var(--font-display);letter-spacing:-.01em;line-height:1.2}
    h1{font-size:1.45rem;margin:1.4rem 0 .8rem}
    h2{font-size:1.05rem;margin:1.6rem 0 .6rem}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px}
    ::selection{background:var(--accent);color:var(--accent-fg)}

    /* ---- nav ---- */
    nav{display:flex;gap:1.1rem;align-items:center;border-bottom:1px solid var(--border);
        padding:.9rem 0;margin-bottom:1.6rem;font-family:var(--font-display)}
    nav a{color:var(--fg);font-size:.92rem}
    nav a:hover{color:var(--accent);text-decoration:none}
    nav .brand{font-weight:700;font-size:1rem;display:inline-flex;align-items:center;gap:.45rem;margin-right:.6rem}
    nav .brand::before{content:"";width:.55rem;height:.55rem;background:var(--accent);border-radius:2px;display:inline-block}
    nav .spacer{flex:1}
    nav .who{color:var(--muted);font-size:.85rem}

    /* ---- forms ---- */
    label{display:block;margin:1rem 0 .3rem;font-family:var(--font-display);
          font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    input,textarea,select{width:100%;padding:.55rem .65rem;border:1px solid var(--input);
          border-radius:var(--radius);box-sizing:border-box;background:var(--surface);color:var(--fg);
          font:inherit;font-size:.95rem;transition:border-color .12s}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
    textarea{min-height:6rem;font-family:var(--font-mono);font-size:.85rem}
    input[type=checkbox]{width:auto;margin:0;accent-color:var(--accent)}
    /* checkbox row: a label that wraps a checkbox — plain text, not the uppercase field-label voice */
    .check{display:inline-flex;align-items:center;gap:.4rem;margin:.15rem 1rem .15rem 0;
           font-family:var(--font-body);font-size:.9rem;font-weight:400;
           letter-spacing:0;text-transform:none;color:var(--fg)}

    /* ---- buttons ---- */
    button,.btn{font-family:var(--font-display);font-size:.9rem;font-weight:500;
        background:var(--accent);color:var(--accent-fg);border:1px solid transparent;
        padding:.55rem 1rem;border-radius:var(--radius);cursor:pointer;text-decoration:none;
        display:inline-block;transition:background .12s,border-color .12s,color .12s}
    button:hover,.btn:hover{background:var(--accent-hover);text-decoration:none}
    button.secondary,.btn.secondary{background:transparent;color:var(--soft-fg);border-color:var(--border)}
    button.secondary:hover,.btn.secondary:hover{background:var(--soft)}
    button.danger,.btn.danger{background:transparent;color:var(--err);
        border-color:color-mix(in srgb,var(--err) 40%,transparent)}
    button.danger:hover,.btn.danger:hover{background:color-mix(in srgb,var(--err) 12%,transparent)}
    .icon-btn{width:1.9rem;height:1.9rem;padding:0;border-radius:50%;display:inline-flex;
        align-items:center;justify-content:center;font-size:1.25rem;line-height:1;font-weight:400;
        transition:filter .12s,transform .12s}
    .icon-btn:hover{filter:brightness(1.08);transform:scale(1.06)}
    .icon-btn:active{transform:scale(.96)}
    td button,td .btn{padding:.28rem .65rem;font-size:.78rem}

    /* ---- feedback ---- */
    .err{color:var(--err)}.msg{color:var(--msg)}

    /* ---- tables ---- */
    table{width:100%;border-collapse:collapse;margin:.6rem 0}
    th{font-family:var(--font-display);font-size:.72rem;font-weight:500;letter-spacing:.08em;
       text-transform:uppercase;color:var(--muted)}
    td,th{text-align:left;padding:.5rem .5rem .5rem 0;border-bottom:1px solid var(--border)}
    .mono{font-family:var(--font-mono);font-size:.85rem}
    h1 .mono,h2 .mono{font-size:.85em;color:var(--muted)}

    /* ---- status badges: dot + mono label, the app's machine-truth voice ---- */
    .status{font-family:var(--font-mono);font-size:.8rem;display:inline-flex;align-items:center;gap:.4rem}
    .status::before{content:"";width:.45rem;height:.45rem;border-radius:50%;background:currentColor;flex:none}
    .st-pending{color:var(--muted)}
    .st-running{color:var(--run)}
    .st-running::before{animation:pulse 1.4s ease-in-out infinite}
    .st-done{color:var(--ok)}
    .st-error{color:var(--err)}
    @keyframes pulse{50%{opacity:.25}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

    /* ---- cards ---- */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
          padding:.9rem 1rem;margin:.6rem 0;transition:border-color .12s}
    .card:hover{border-color:color-mix(in srgb,var(--accent) 35%,var(--border))}

    /* ---- terminal log pane ---- */
    .term{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:.6rem 0}
    .term-head{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.06em;color:var(--muted);
          padding:.4rem .8rem;border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:center}
    .term-body{padding:.6rem .8rem;max-height:40vh;overflow:auto;
          font-family:var(--font-mono);font-size:.82rem;line-height:1.55}

    code{background:var(--code);padding:.1rem .35rem;border-radius:4px;
         font-family:var(--font-mono);font-size:.85em}

    #theme{position:fixed;top:.7rem;right:.7rem;width:2rem;height:2rem;padding:0;border-radius:50%;
        background:transparent;color:var(--muted);border:1px solid var(--border);font-size:.95rem;line-height:1}
    #theme:hover{color:var(--fg);background:var(--soft)}
  </style>
</head>
<body>
  <button id="theme" title="Toggle dark/light"
    onclick="t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=localStorage.theme=t">◐</button>
  {% if user %}
  <nav>
    <a class="brand" href="workflows">Workflow Builder</a>
    <a href="workflows">Workflows</a>
    <a href="runs">Runs</a>
    {% if user.role == 'admin' %}<a href="admin">Admin</a>{% endif %}
    <span class="spacer"></span>
    <a class="who" href="account">{{ user.name }} ({{ user.role }})</a>
    <form method="post" action="logout"><button class="secondary">Log out</button></form>
  </nav>
  {% endif %}
  {% block content %}{% endblock %}

  <!-- App confirm dialog (native <dialog>) — used instead of the browser's confirm().
       Any form with data-confirm="message" is intercepted and asks here first. -->
  <dialog id="confirmDlg" style="border:1px solid var(--border);border-radius:12px;padding:0;
       max-width:26rem;background:var(--surface);color:var(--fg)">
    <div style="padding:1.2rem 1.2rem 0">
      <p id="confirmMsg" style="margin:0 0 1rem;line-height:1.4"></p>
    </div>
    <form method="dialog" style="display:flex;gap:.5rem;justify-content:flex-end;padding:0 1.2rem 1.2rem">
      <button value="cancel" class="secondary">Cancel</button>
      <button value="ok" autofocus>Confirm</button>
    </form>
  </dialog>
  <style>#confirmDlg::backdrop{background:rgba(0,0,0,.5)}</style>
  <script>
  (function(){
    const dlg = document.getElementById("confirmDlg");
    const msg = document.getElementById("confirmMsg");
    let pending = null;
    document.addEventListener("submit", e => {
      const f = e.target;
      if (f.dataset.confirm && !f.dataset.confirmed) {
        e.preventDefault();
        msg.textContent = f.dataset.confirm;
        pending = f;
        dlg.showModal();
      }
    });
    dlg.addEventListener("close", () => {
      if (dlg.returnValue === "ok" && pending) {
        pending.dataset.confirmed = "1";
        pending.submit();           // bypasses the submit listener
      }
      pending = null;
    });
  })();
  </script>
</body>
</html>
