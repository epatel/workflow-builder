# home — add these lines INSIDE the https VirtualHost in
# /etc/apache2/sites-enabled/000-default-le-ssl.conf (alongside the existing ProxyPass entries).
#
# Exposes the agent's read-only sandbox file API so the web host (rpi6) can browse/view/download
# a run's files live. Apache strips /workflow-agent -> the file API on :9006. Token-protected.
#
# After editing: sudo apache2ctl configtest && sudo systemctl reload apache2

RedirectMatch ^/workflow-agent$ /workflow-agent/
ProxyPass        /workflow-agent/ http://localhost:9006/
ProxyPassReverse /workflow-agent/ http://localhost:9006/
